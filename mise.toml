[tools]
claude-code = "latest"
node = "22"
supabase = "2.75.0"
vercel = "latest"

[env]
_.file = [".env.development.local", ".env.development"]


[tasks."env:all"]
description = "모든 환경변수 파일 생성"
run = """
#!/usr/bin/env bash
set -euo pipefail

# 사전 확인
if ! command -v supabase &> /dev/null; then
  echo "❌ supabase CLI가 설치되어 있지 않습니다"
  exit 1
fi

SB_OUT=$(supabase status -o json 2>&1 || true)
if ! echo "$SB_OUT" | grep -q '"API_URL"'; then
  echo "❌ supabase가 실행 중이 아닙니다. 'supabase start'를 먼저 실행하세요"
  exit 1
fi

if [ ! -f .vercel/project.json ]; then
  echo "❌ Vercel 프로젝트가 연결되지 않았습니다. 'vercel link'를 먼저 실행하세요"
  exit 1
fi

if ! vercel whoami &> /dev/null; then
  echo "❌ Vercel 인증이 필요합니다. 'vercel login'을 먼저 실행하세요"
  exit 1
fi

# 1/3 Vercel preview env
vercel env pull .env.development --environment=preview 2>/dev/null || {
  echo "❌ Vercel preview 환경변수 가져오기 실패. 'vercel login' 후 다시 시도하세요"
  exit 1
}
echo "✅ .env.development 생성 완료"

# 2/3 Vercel production env
vercel env pull .env.production --environment=production 2>/dev/null || {
  echo "❌ Vercel production 환경변수 가져오기 실패. 'vercel login' 후 다시 시도하세요"
  exit 1
}
echo "✅ .env.production 생성 완료"

# 3/3 Supabase local env
API_URL=$(echo "$SB_OUT" | grep '"API_URL"' | cut -d'"' -f4)
ANON_KEY=$(echo "$SB_OUT" | grep '"ANON_KEY"' | cut -d'"' -f4)

cat > .env.development.local << EOF
# 자동 생성됨 (mise run env:all)
NEXT_PUBLIC_SUPABASE_URL=${API_URL}
NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${ANON_KEY}
EOF
echo "✅ .env.development.local 생성 완료"

echo ""
echo "✅ 모든 환경변수 파일 생성 완료"
"""
