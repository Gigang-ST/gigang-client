name: Visual Diff

on:
  pull_request:
    branches: [dev]

concurrency:
  group: visual-diff-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  deployments: read

env:
  DEV_SITE_URL: https://dev.gigang.team
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
  E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
  E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

jobs:
  visual-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── agent-browser 설치 ──
      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install

      # ── Vercel Preview 배포 대기 ──
      - name: Wait for Vercel Preview
        id: preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          check_interval: 10
          path: /?x-vercel-protection-bypass=${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      # ── 뷰포트 설정 (모바일 393x852) ──
      - name: Configure viewport
        run: agent-browser set viewport 393 852

      # ── Before: dev 사이트 스크린샷 ──
      - name: Login to dev site
        run: node scripts/visual-diff-auth.mjs "$DEV_SITE_URL"

      - name: Capture before screenshots (dev)
        run: |
          mkdir -p screenshots/before
          PAGES=(
            "home:/"
            "races:/races"
            "records:/records"
            "profile:/profile"
            "join:/join"
            "settings:/settings"
            "login:/auth/login"
          )
          for entry in "${PAGES[@]}"; do
            name="${entry%%:*}"
            path="${entry#*:}"
            echo "📸 [before] $name"
            agent-browser open "$DEV_SITE_URL$path"
            agent-browser wait --load networkidle
            sleep 2
            agent-browser screenshot "screenshots/before/$name.png"
          done

      # ── Preview용 Vercel Protection bypass 헤더 설정 ──
      - name: Set bypass header for preview
        run: |
          agent-browser set headers "{\"x-vercel-protection-bypass\":\"${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}\"}"

      # ── After: preview 사이트 스크린샷 + diff ──
      - name: Login to preview site
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        run: node scripts/visual-diff-auth.mjs "$PREVIEW_URL"

      - name: Capture after screenshots + diff
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          NO_COLOR: "1"
        run: |
          mkdir -p screenshots/after screenshots/diff
          PAGES=(
            "home:/"
            "races:/races"
            "records:/records"
            "profile:/profile"
            "join:/join"
            "settings:/settings"
            "login:/auth/login"
          )
          DIFF_SUMMARY=""
          for entry in "${PAGES[@]}"; do
            name="${entry%%:*}"
            path="${entry#*:}"
            echo "📸 [after] $name"
            agent-browser open "$PREVIEW_URL$path"
            agent-browser wait --load networkidle
            sleep 2
            agent-browser screenshot "screenshots/after/$name.png"

            # diff (baseline = before 이미지)
            DIFF_OUTPUT=$(agent-browser diff screenshot \
              --baseline "screenshots/before/$name.png" \
              --output "screenshots/diff/$name.png" 2>&1) || true
            DIFF_SUMMARY="$DIFF_SUMMARY\n$name: $DIFF_OUTPUT"

            # agent-browser는 0%/100% diff일 때 파일을 생성하지 않음
            if [ ! -f "screenshots/diff/$name.png" ]; then
              cp "screenshots/after/$name.png" "screenshots/diff/$name.png"
            fi
          done

          echo -e "$DIFF_SUMMARY" | tee screenshots/diff-summary.txt

      # ── gh-pages에 이미지 업로드 ──
      - name: Deploy images to gh-pages
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          RUN_ID=${{ github.run_id }}
          DEST_DIR="visual-diff/pr-${PR_NUMBER}"

          git fetch origin gh-pages 2>/dev/null || true

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git worktree add gh-pages-dir origin/gh-pages
          else
            git worktree add --detach gh-pages-dir
            cd gh-pages-dir
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            cd ..
          fi

          rm -rf "gh-pages-dir/${DEST_DIR}"
          mkdir -p "gh-pages-dir/${DEST_DIR}"
          cp -r screenshots/before "gh-pages-dir/${DEST_DIR}/"
          cp -r screenshots/after "gh-pages-dir/${DEST_DIR}/"
          cp -r screenshots/diff "gh-pages-dir/${DEST_DIR}/"

          cd gh-pages-dir
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${DEST_DIR}"
          git commit -m "visual-diff: PR #${PR_NUMBER} (run ${RUN_ID})" --allow-empty
          git push origin HEAD:gh-pages

      # ── PR 코멘트 ──
      - name: Post visual diff comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const prNumber = context.issue.number;
            const runId = context.runId;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pagesBase = `https://${owner}.github.io/${repo}`;
            const imgBase = `${pagesBase}/visual-diff/pr-${prNumber}`;

            const pages = ['home', 'races', 'records', 'profile', 'join', 'settings', 'login'];

            // diff 요약 파싱
            const diffInfo = {};
            try {
              const raw = fs.readFileSync('screenshots/diff-summary.txt', 'utf-8');
              for (const line of raw.split('\n')) {
                const ok = line.match(/^(\w+):\s*✓\s*Images match/);
                const fail = line.match(/^(\w+):\s*✗\s*([\d.]+)%/);
                if (ok) diffInfo[ok[1]] = { match: true, percent: '0' };
                else if (fail) diffInfo[fail[1]] = { match: false, percent: fail[2] };
              }
            } catch {}

            const changed = pages.filter(p => diffInfo[p] && !diffInfo[p].match);
            const unchanged = pages.filter(p => !diffInfo[p] || diffInfo[p].match);
            const total = pages.length;

            let body = `## Visual Diff\n\n`;

            // ── 요약 배너 ──
            if (changed.length === 0) {
              body += `> **✅ 모든 페이지가 동일합니다** (${total}/${total} unchanged)\n\n`;
            } else {
              body += `> **⚠️ ${changed.length}개 페이지에서 변경 감지** (${changed.length}/${total} changed)\n\n`;
            }

            // ── Changed: 자동 펼침 + Before/After/Diff 3열 ──
            if (changed.length > 0) {
              body += `### Changed\n\n`;
              for (const name of changed) {
                const file = `${name}.png`;
                const info = diffInfo[name];
                const pct = info ? info.percent : '?';
                body += `<details open><summary><b>${name}</b> — ⚠️ ${pct}% diff</summary>\n\n`;
                body += `| Before (dev) | After (PR) | Diff |\n`;
                body += `|:---:|:---:|:---:|\n`;
                body += `| <img src="${imgBase}/before/${file}?v=${runId}" width="240" /> `;
                body += `| <img src="${imgBase}/after/${file}?v=${runId}" width="240" /> `;
                body += `| <img src="${imgBase}/diff/${file}?v=${runId}" width="240" /> |\n\n`;
                body += `</details>\n\n`;
              }
            }

            // ── Unchanged: 간결한 테이블 ──
            if (unchanged.length > 0) {
              if (changed.length > 0) {
                body += `### Unchanged (${unchanged.length})\n\n`;
              }
              body += `| Page | Status |\n`;
              body += `|------|--------|\n`;
              for (const name of unchanged) {
                body += `| ${name} | ✅ No change |\n`;
              }
              body += `\n`;
            }

            body += `---\n<sub>Visual Diff · <a href="https://github.com/${owner}/${repo}/actions/runs/${runId}">Run #${runId}</a></sub>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });
            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' &&
              c.body?.includes('Visual Diff')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }
