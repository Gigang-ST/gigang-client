name: Visual Diff

on:
  pull_request:
    branches: [main]

concurrency:
  group: visual-diff-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
  E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

jobs:
  visual-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      # ── Supabase 로컬 환경 ──
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Start Supabase (필수 서비스만)
        run: supabase start --exclude "storage,edge-runtime,imgproxy,vector,logflare,realtime,inbucket,postgrest-caller-id"

      - name: Set Supabase env vars
        run: |
          STATUS=$(supabase status --output json)
          echo "NEXT_PUBLIC_SUPABASE_URL=$(echo $STATUS | jq -r '.API_URL')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$(echo $STATUS | jq -r '.ANON_KEY')" >> $GITHUB_ENV

      - name: Seed test user
        run: pnpm tsx scripts/create-test-user.ts

      # ── main 브랜치 스크린샷 (before) ──
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: __main-branch

      - name: Build & start main branch
        working-directory: __main-branch
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm start &
          npx wait-on http://localhost:3000 --timeout 30000
          sleep 3

      - name: Capture baseline screenshots
        run: |
          pnpm run screenshots:login
          pnpm run screenshots:before
          kill $(lsof -ti:3000) 2>/dev/null || true
          sleep 2

      # ── PR 브랜치 스크린샷 (after) ──
      - name: Clean up main branch checkout
        run: rm -rf __main-branch

      - name: Build & start PR branch
        run: |
          pnpm build
          pnpm start &
          npx wait-on http://localhost:3000 --timeout 30000
          sleep 3

      - name: Capture PR screenshots + diff
        run: |
          pnpm run screenshots:login
          pnpm run screenshots:after

      # ── GitHub Pages에 이미지 업로드 ──
      - name: Deploy screenshots to gh-pages
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          DEST_DIR="visual-diff/pr-${PR_NUMBER}"

          # gh-pages 브랜치 체크아웃 (없으면 새로 생성)
          git fetch origin gh-pages || true
          git worktree add gh-pages-dir origin/gh-pages 2>/dev/null || {
            git worktree add --orphan gh-pages-dir
          }

          # 기존 이미지 삭제 후 새로 복사
          rm -rf "gh-pages-dir/${DEST_DIR}"
          mkdir -p "gh-pages-dir/${DEST_DIR}"
          cp -r screenshots/before "gh-pages-dir/${DEST_DIR}/"
          cp -r screenshots/after "gh-pages-dir/${DEST_DIR}/"
          cp -r screenshots/diff "gh-pages-dir/${DEST_DIR}/"

          # 커밋 & 푸시
          cd gh-pages-dir
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${DEST_DIR}"
          git commit -m "visual-diff: PR #${PR_NUMBER}" --allow-empty
          git push origin HEAD:gh-pages

      # ── PR 코멘트 (이미지 인라인) ──
      - name: Post PR comment with inline images
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const diffDir = 'screenshots/diff';
            if (!fs.existsSync(diffDir)) return;
            const files = fs.readdirSync(diffDir).filter(f => f.endsWith('.png'));
            if (files.length === 0) return;

            const prNumber = context.issue.number;
            const repo = `${context.repo.owner}/${context.repo.repo}`;

            // GitHub Pages 기본 URL
            // {owner}.github.io/{repo} 또는 커스텀 도메인
            const pagesBase = `https://${context.repo.owner}.github.io/${context.repo.repo}`;
            const runId = context.runId;
            const imgBase = `${pagesBase}/visual-diff/pr-${prNumber}`;

            // diff 요약
            let summary = '';
            try {
              summary = execSync('pnpm tsx scripts/screenshots-diff.ts 2>&1').toString();
            } catch (e) {
              summary = e.stdout?.toString() || '';
            }
            const summaryLines = summary.split('\n')
              .filter(l => l.includes('✅') || l.includes('🔴') || l.includes('결과') || l.includes('───'))
              .join('\n');

            let body = '## 📸 Visual Diff Report\n\n';
            body += '```\n' + summaryLines + '\n```\n\n';

            for (const file of files) {
              const name = file.replace('.png', '');
              body += `<details><summary><b>${name}</b></summary>\n\n`;
              body += `| Before (main) | After (PR) | Diff |\n`;
              body += `|:---:|:---:|:---:|\n`;
              body += `| <img src="${imgBase}/before/${file}?v=${runId}" width="250" /> `;
              body += `| <img src="${imgBase}/after/${file}?v=${runId}" width="250" /> `;
              body += `| <img src="${imgBase}/diff/${file}?v=${runId}" width="250" /> |\n\n`;
              body += `</details>\n\n`;
            }

            body += `\n---\n*Generated by Visual Diff — ${new Date().toISOString().split('T')[0]}*`;

            // 기존 코멘트 업데이트 또는 새로 생성
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body?.includes('Visual Diff Report'));
            const params = { owner: context.repo.owner, repo: context.repo.repo, body };

            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: prNumber });
            }
