name: Visual Diff

on:
  pull_request:
    branches: [dev]

concurrency:
  group: visual-diff-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  deployments: read

env:
  # Vercel к°ңл°ңкі„ кё°ліё лҸ„л©”мқё (н”„лЎңлҚ•м…ҳ л°°нҸ¬ URL)
  DEV_SITE_URL: https://dev.gigang.team
  # Supabase dev н”„лЎңм қнҠё
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
  # н…ҢмҠӨнҠё кі„м • (visual-diff-bot@gigang.team)
  E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
  E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

jobs:
  visual-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # в”Җв”Җ agent-browser м„Өм№ҳ в”Җв”Җ
      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install

      # в”Җв”Җ Vercel Preview л°°нҸ¬ лҢҖкё° в”Җв”Җ
      - name: Wait for Vercel Preview
        id: preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          check_interval: 10
          path: /?x-vercel-protection-bypass=${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      # в”Җв”Җ л·°нҸ¬нҠё м„Өм • (лӘЁл°”мқј 393x852) в”Җв”Җ
      - name: Configure viewport
        run: agent-browser set viewport 393 852

      # в”Җв”Җ Before: dev мӮ¬мқҙнҠё мҠӨнҒ¬лҰ°мғ· в”Җв”Җ
      - name: Login to dev site
        run: node scripts/visual-diff-auth.mjs "$DEV_SITE_URL"

      - name: Capture before screenshots (dev)
        run: |
          mkdir -p screenshots/before
          PAGES=(
            "home:/"
            "races:/races"
            "records:/records"
            "profile:/profile"
            "join:/join"
            "settings:/settings"
            "login:/auth/login"
          )
          for entry in "${PAGES[@]}"; do
            name="${entry%%:*}"
            path="${entry#*:}"
            echo "рҹ“ё [before] $name ($DEV_SITE_URL$path)"
            agent-browser open "$DEV_SITE_URL$path"
            sleep 3
            agent-browser screenshot "screenshots/before/$name.png" --full
          done

      # в”Җв”Җ Previewмҡ© Vercel Protection bypass н—ӨлҚ” м„Өм • в”Җв”Җ
      - name: Set bypass header for preview
        run: |
          agent-browser set headers "{\"x-vercel-protection-bypass\":\"${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}\"}"

      # в”Җв”Җ After: preview мӮ¬мқҙнҠё мҠӨнҒ¬лҰ°мғ· + diff в”Җв”Җ
      - name: Login to preview site
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        run: node scripts/visual-diff-auth.mjs "$PREVIEW_URL"

      - name: Capture after screenshots + diff
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          NO_COLOR: "1"
        run: |
          mkdir -p screenshots/after screenshots/diff
          PAGES=(
            "home:/"
            "races:/races"
            "records:/records"
            "profile:/profile"
            "join:/join"
            "settings:/settings"
            "login:/auth/login"
          )
          DIFF_SUMMARY=""
          for entry in "${PAGES[@]}"; do
            name="${entry%%:*}"
            path="${entry#*:}"
            echo "рҹ“ё [after] $name ($PREVIEW_URL$path)"
            agent-browser open "$PREVIEW_URL$path"
            sleep 3
            agent-browser screenshot "screenshots/after/$name.png" --full

            # diff (baseline = before мқҙлҜём§Җ)
            DIFF_OUTPUT=$(agent-browser diff screenshot \
              --baseline "screenshots/before/$name.png" \
              --output "screenshots/diff/$name.png" 2>&1) || true
            DIFF_SUMMARY="$DIFF_SUMMARY\n$name: $DIFF_OUTPUT"

            # agent-browserлҠ” 0%/100% diffмқј л•Ң нҢҢмқјмқ„ мғқм„ұн•ҳм§Җ м•ҠмқҢ
            # fallback: diff нҢҢмқјмқҙ м—Ҷмңјл©ҙ л№Ҳ placeholder мғқм„ұ
            if [ ! -f "screenshots/diff/$name.png" ]; then
              cp "screenshots/after/$name.png" "screenshots/diff/$name.png"
            fi
          done

          echo -e "$DIFF_SUMMARY" | tee screenshots/diff-summary.txt

      # в”Җв”Җ gh-pagesм—җ мқҙлҜём§Җ м—…лЎңл“ң в”Җв”Җ
      - name: Deploy images to gh-pages
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          RUN_ID=${{ github.run_id }}
          DEST_DIR="visual-diff/pr-${PR_NUMBER}"

          git fetch origin gh-pages 2>/dev/null || true

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git worktree add gh-pages-dir origin/gh-pages
          else
            git worktree add --detach gh-pages-dir
            cd gh-pages-dir
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            cd ..
          fi

          rm -rf "gh-pages-dir/${DEST_DIR}"
          mkdir -p "gh-pages-dir/${DEST_DIR}"
          cp -r screenshots/before "gh-pages-dir/${DEST_DIR}/"
          cp -r screenshots/after "gh-pages-dir/${DEST_DIR}/"
          cp -r screenshots/diff "gh-pages-dir/${DEST_DIR}/"

          cd gh-pages-dir
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${DEST_DIR}"
          git commit -m "visual-diff: PR #${PR_NUMBER} (run ${RUN_ID})" --allow-empty
          git push origin HEAD:gh-pages

      # в”Җв”Җ PR мҪ”л©ҳнҠё в”Җв”Җ
      - name: Post visual diff comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const prNumber = context.issue.number;
            const runId = context.runId;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pagesBase = `https://${owner}.github.io/${repo}`;
            const imgBase = `${pagesBase}/visual-diff/pr-${prNumber}`;

            const pages = ['home', 'races', 'records', 'profile', 'join', 'settings', 'login'];

            // diff мҡ”м•Ҫ нҢҢмӢұ вҶ’ { name: { match, percent } }
            const diffInfo = {};
            try {
              const raw = fs.readFileSync('screenshots/diff-summary.txt', 'utf-8');
              for (const line of raw.split('\n')) {
                const matchOk = line.match(/^(\w+):\s*вң“\s*Images match/);
                const matchFail = line.match(/^(\w+):\s*вң—\s*([\d.]+)%/);
                if (matchOk) diffInfo[matchOk[1]] = { match: true, percent: '0' };
                else if (matchFail) diffInfo[matchFail[1]] = { match: false, percent: matchFail[2] };
              }
            } catch {}

            // мҡ”м•Ҫ н…Ңмқҙлё”
            const changed = pages.filter(p => diffInfo[p] && !diffInfo[p].match);
            const unchanged = pages.filter(p => !diffInfo[p] || diffInfo[p].match);

            let body = '## рҹ“Ҡ Visual Diff Report\n\n';
            body += `| нҺҳмқҙм§Җ | мғҒнғң | ліҖкІҪлҘ  |\n`;
            body += `|--------|:----:|-------:|\n`;
            for (const name of pages) {
              const info = diffInfo[name];
              if (!info || info.match) {
                body += `| ${name} | вң… | 0% |\n`;
              } else {
                body += `| ${name} | вқҢ | ${info.percent}% |\n`;
              }
            }

            // ліҖкІҪлҗң нҺҳмқҙм§Җ мқҙлҜём§Җ (нҺјміҗм„ң н‘ңмӢң)
            if (changed.length > 0) {
              body += `\n### ліҖкІҪлҗң нҺҳмқҙм§Җ\n\n`;
              for (const name of changed) {
                const file = `${name}.png`;
                body += `#### ${name}\n\n`;
                body += `| Before (dev) | After (PR) | Diff |\n`;
                body += `|:---:|:---:|:---:|\n`;
                body += `| <img src="${imgBase}/before/${file}?v=${runId}" width="250" /> `;
                body += `| <img src="${imgBase}/after/${file}?v=${runId}" width="250" /> `;
                body += `| <img src="${imgBase}/diff/${file}?v=${runId}" width="250" /> |\n\n`;
              }
            }

            // ліҖкІҪ м—ҶлҠ” нҺҳмқҙм§Җ мқҙлҜём§Җ (м ‘нҳҖм„ң н‘ңмӢң)
            if (unchanged.length > 0) {
              body += `<details><summary>ліҖкІҪ м—ҶлҠ” нҺҳмқҙм§Җ (${unchanged.length})</summary>\n\n`;
              for (const name of unchanged) {
                const file = `${name}.png`;
                body += `#### ${name}\n\n`;
                body += `| Before (dev) | After (PR) | Diff |\n`;
                body += `|:---:|:---:|:---:|\n`;
                body += `| <img src="${imgBase}/before/${file}?v=${runId}" width="250" /> `;
                body += `| <img src="${imgBase}/after/${file}?v=${runId}" width="250" /> `;
                body += `| <img src="${imgBase}/diff/${file}?v=${runId}" width="250" /> |\n\n`;
              }
              body += `</details>\n\n`;
            }

            body += `---\n*Visual Diff В· [Run #${runId}](https://github.com/${owner}/${repo}/actions/runs/${runId})*`;

            // кё°мЎҙ мҪ”л©ҳнҠё м—…лҚ°мқҙнҠё лҳҗлҠ” мғҲлЎң мғқм„ұ
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });
            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' &&
              c.body?.includes('Visual Diff Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }
