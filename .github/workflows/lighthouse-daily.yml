name: Lighthouse — Daily

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 00:00 UTC = 09:00 KST
  workflow_dispatch:
    inputs:
      url:
        description: '측정할 URL (비우면 프로덕션 https://gigang.team/ 사용)'
        required: false
        default: 'https://gigang.team/'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse
        run: npm install -g lighthouse@12

      - name: Run Lighthouse
        env:
          TARGET_URL: ${{ github.event.inputs.url || 'https://gigang.team/' }}
        run: |
          lighthouse "$TARGET_URL" \
            --output html \
            --output json \
            --output-path ./lighthouse \
            --chrome-flags="--headless=new --no-sandbox --disable-dev-shm-usage" \
            --quiet

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: |
            lighthouse.report.html
            lighthouse.report.json
          retention-days: 30
