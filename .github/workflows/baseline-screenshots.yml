name: Baseline Screenshots

on:
  push:
    branches: [main]

concurrency:
  group: baseline-screenshots
  cancel-in-progress: true

permissions:
  contents: write

env:
  E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
  E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium

      - uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Start Supabase
        run: supabase start --exclude "storage,edge-runtime,imgproxy,vector,logflare,realtime,inbucket,postgrest-caller-id"

      - name: Set Supabase env vars
        run: |
          STATUS=$(supabase status --output json)
          echo "NEXT_PUBLIC_SUPABASE_URL=$(echo $STATUS | jq -r '.API_URL')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$(echo $STATUS | jq -r '.ANON_KEY')" >> $GITHUB_ENV

      - name: Seed test user
        run: pnpm tsx scripts/create-test-user.ts

      - name: Build & start
        run: |
          pnpm build
          pnpm start &
          npx wait-on http://localhost:3000 --timeout 30000
          sleep 3

      - name: Capture baseline screenshots
        run: |
          pnpm run screenshots:login
          pnpm run screenshots:before

      - name: Deploy baseline to gh-pages
        run: |
          git fetch origin gh-pages || true
          git worktree add gh-pages-dir origin/gh-pages 2>/dev/null || {
            git worktree add --orphan gh-pages-dir
          }

          rm -rf gh-pages-dir/baseline
          cp -r screenshots/before gh-pages-dir/baseline

          cd gh-pages-dir
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baseline
          git commit -m "baseline: $(date -u +%Y-%m-%dT%H:%M:%SZ)" --allow-empty
          git push origin HEAD:gh-pages
