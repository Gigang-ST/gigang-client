name: "Feature"
description: "새로운 기능 요청"
labels: ["area/dev"]
body:
  - type: markdown
    attributes:
      value: |
        ## 새로운 기능 요청

  - type: textarea
    id: background
    attributes:
      label: "배경"
      description: "이 기능이 필요한 이유와 맥락을 설명해주세요."
      placeholder: "현재 어떤 문제가 있고, 이 기능이 왜 필요한지..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "기대 동작"
      description: "이 기능이 완성되면 어떻게 동작해야 하는지 설명해주세요."
      placeholder: "사용자가 ~하면 ~가 된다"
    validations:
      required: true

  - type: textarea
    id: flow
    attributes:
      label: "사용자 플로우 (선택)"
      description: "mermaid 다이어그램이나 코드블록으로 흐름을 설명할 수 있어요."
      placeholder: |
        ```mermaid
        flowchart LR
          A[사용자 액션] --> B[서버 처리] --> C[결과 표시]
        ```
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: "참고 사항 (선택)"
      description: "관련 이슈, 디자인 참고, 기술적 제약 등"
    validations:
      required: false
